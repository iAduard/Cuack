<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cuack-RNG | Gen 3 Assistant</title>
    <style>
        body { background: #1a202c; color: #e2e8f0; font-family: 'Segoe UI', Tahoma, sans-serif; font-size: 11px; margin: 20px; }
        .grid-container { display: grid; grid-template-columns: 320px 1fr; gap: 20px; }
        .panel { border: 1px solid #4a5568; padding: 15px; background: #2d3748; border-radius: 4px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h3 { margin: 0 0 10px 0; font-size: 11px; color: #cbd5e0; text-transform: uppercase; border-bottom: 1px solid #4a5568; padding-bottom: 5px; letter-spacing: 0.5px; }
        .field-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .field { display: flex; justify-content: space-between; align-items: center; }
        
        textarea { background: #1a202c; color: #fff; border: 1px solid #4a5568; width: 100%; height: 90px; resize: none; font-family: 'Consolas', monospace; padding: 8px; box-sizing: border-box; border-radius: 2px; }
        input, select { background: #1a202c; color: #fff; border: 1px solid #4a5568; padding: 4px; width: 140px; border-radius: 2px; }
        input[type="number"].iv-input { width: 40px; text-align: center; }
        
        .btn-calc { background: #4a5568; color: #fff; border: 1px solid #718096; padding: 6px; font-size: 10px; width: 100%; cursor: pointer; margin-top: 5px; text-transform: uppercase; }
        .btn-calc:hover { background: #718096; }
        .btn-main { background: #edf2f7; color: #1a202c; border: none; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 15px; border-radius: 2px; text-transform: uppercase; }
        .btn-main:hover { background: #cbd5e0; }
        .btn-main:disabled { background: #4a5568; color: #718096; cursor: not-allowed; }

        .scroll-table { overflow-y: auto; max-height: 600px; border: 1px solid #4a5568; background: #1a202c; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #4a5568; padding: 7px; text-align: center; font-family: 'Consolas', monospace; }
        th { background: #2d3748; color: #fff; position: sticky; top: 0; z-index: 10; }
        tr:hover { background: #2d3748; }
        .shiny-row { background: rgba(255, 255, 255, 0.15) !important; color: #fff; font-weight: bold; }
    </style>
</head>
<body>

<div class="grid-container">
    <div class="panel">
        <h3>Version & Pokemon</h3>
        <div class="field-group">
            <div class="field">
                Version: 
                <select id="game_version" onchange="updateCategories()" style="width: 160px;">
                    <option value="FRLG">Fire Red / Leaf Green</option>
                    <option value="RSE">Emerald / Ruby / Sapphire</option>
                </select>
            </div>
            <div class="field">
                Category: 
                <select id="pkmn_category" onchange="updatePokemonList()" style="width: 160px;"></select>
            </div>
            <div class="field">
                Pokemon: 
                <select id="stats_pokemon" style="width: 160px;"></select>
            </div>
            <div class="field">
                Nature: 
                <select id="stats_nature" style="width: 160px;"></select>
            </div>
        </div>
        <textarea id="enter_stats" placeholder="Level HP Atk Def Spa Spd Spe"></textarea>
        <button class="btn-calc" onclick="calcularIVs()">Calculate IVs & Filter</button>
        <br><br>

        <h3>RNG Information</h3>
        <div class="field-group">
            <div class="field">TID: <input type="number" id="tid" value="34868"></div>
            <div class="field">SID: <input type="number" id="sid" value="41173"></div>
            <div class="field">Method: 
                <select id="method">
                    <option value="1">Method 1 (Static)</option>
                    <option value="2">Method 2 (Wild)</option>
                    <option value="4">Method 4 (Rare)</option>
                </select>
            </div>
            <div class="field">Target Advances: <input type="number" id="target_adv" value="500"></div>
            <div class="field">+/- (Offset): <input type="number" id="offset_adv" value="10"></div>
        </div>

        <h3>Enter Seeds</h3>
        <textarea id="enter_seeds" placeholder="FFFF (Empty for Reverse Search)"></textarea>
        <button class="btn-main" id="searchBtn" onclick="buscar()">Search</button>
    </div>

    <div class="panel">
        <h3>Filters</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 15px;">
            <div>
                <div class="field">HP: <input type="number" id="hp_min" class="iv-input" value="0"> ~ <input type="number" id="hp_max" class="iv-input" value="31"></div>
                <div class="field">Atk: <input type="number" id="at_min" class="iv-input" value="0"> ~ <input type="number" id="at_max" class="iv-input" value="31"></div>
                <div class="field">Def: <input type="number" id="df_min" class="iv-input" value="0"> ~ <input type="number" id="df_max" class="iv-input" value="31"></div>
                <div class="field">SpA: <input type="number" id="sa_min" class="iv-input" value="0"> ~ <input type="number" id="sa_max" class="iv-input" value="31"></div>
                <div class="field">SpD: <input type="number" id="sd_min" class="iv-input" value="0"> ~ <input type="number" id="sd_max" class="iv-input" value="31"></div>
                <div class="field">Spe: <input type="number" id="sp_min" class="iv-input" value="0"> ~ <input type="number" id="sp_max" class="iv-input" value="31"></div>
            </div>
            <div>
                <div class="field">Nature: <select id="f_nature" style="width: 100px;"><option value="any">Any</option></select></div>
                <div class="field">Shiny: <select id="f_shiny" style="width: 100px;"><option value="any">Any</option><option value="yes">Shiny Only</option></select></div>
            </div>
        </div>

        <div class="scroll-table">
            <table id="resultsTable">
                <thead>
                    <tr>
                        <th>Advances</th><th>PID</th><th>Seed</th><th>Nature</th><th>HP</th><th>Atk</th><th>Def</th><th>SpA</th><th>SpD</th><th>Spe</th><th>Shiny</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script src="pokemonData.js"></script>
<script>
    const natures = ["Hardy", "Lonely", "Brave", "Adamant", "Naughty", "Bold", "Docile", "Relaxed", "Impish", "Lax", "Timid", "Hasty", "Serious", "Jolly", "Naive", "Modest", "Mild", "Quiet", "Bashful", "Rash", "Calm", "Gentle", "Sassy", "Careful", "Quirky"];
    
    // Categorías y Filtros por Versión
    const gameData = {
        "FRLG": {
            "Starters": ["Bulbasaur", "Charmander", "Squirtle"],
            "Gifts": ["Eevee", "Lapras", "Hitmonlee", "Hitmonchan", "Omanyte", "Kabuto", "Aerodactyl"],
            "Static/Legendaries": ["Articuno", "Zapdos", "Moltres", "Mewtwo", "Snorlax"],
            "Wild (Method 2)": ["Pikachu", "Abra", "Clefairy", "Gastly", "Ditto"]
        },
        "RSE": {
            "Starters": ["Treecko", "Torchic", "Mudkip"],
            "Static": ["Kyogre", "Groudon", "Rayquaza", "Regirock", "Regice", "Registeel", "Beldum", "Castform"],
            "Wild (Method 2)": ["Ralts", "Bagon", "Feebas", "Slakoth"]
        }
    };

    function updateCategories() {
        const version = document.getElementById('game_version').value;
        const catSel = document.getElementById('pkmn_category');
        catSel.innerHTML = "";
        Object.keys(gameData[version]).forEach(cat => {
            catSel.add(new Option(cat, cat));
        });
        updatePokemonList();
    }

    function updatePokemonList() {
        const version = document.getElementById('game_version').value;
        const category = document.getElementById('pkmn_category').value;
        const pSel = document.getElementById('stats_pokemon');
        const mSel = document.getElementById('method');
        pSel.innerHTML = "";
        
        // Auto-selección de método según categoría
        if (category.includes("Wild")) mSel.value = "2";
        else mSel.value = "1";

        gameData[version][category].forEach(name => {
            if (pokemonDB[name]) pSel.add(new Option(name, name));
        });
    }

    // Inicialización de Natures
    const nSel = document.getElementById('f_nature');
    const sNSel = document.getElementById('stats_nature');
    natures.forEach((n, i) => { 
        nSel.add(new Option(n, i)); 
        sNSel.add(new Option(n, i));
    });

    window.onload = () => {
        if (typeof pokemonDB !== 'undefined') updateCategories();
        else document.getElementById('stats_pokemon').innerHTML = '<option>Error DB</option>';
    };

    function calcularIVs() {
        const pName = document.getElementById('stats_pokemon').value;
        const natureIdx = parseInt(sNSel.value);
        const lines = document.getElementById('enter_stats').value.trim().split('\n');
        if (!pName || lines.length === 0) return alert("Selecciona Pokémon y entra stats.");

        const base = pokemonDB[pName];
        const ids = ['hp', 'at', 'df', 'sa', 'sd', 'sp'];
        const mods = [1,1,1,1,1,1]; 
        const up = Math.floor(natureIdx / 5), down = natureIdx % 5;
        if(up !== down) { mods[up+1] += 0.1; mods[down+1] -= 0.1; }

        let finalRanges = ids.map(() => ({ min: 0, max: 31 }));

        lines.forEach(line => {
            const raw = line.trim().split(/\s+/);
            if (raw.length < 7) return;
            const [lvl, ...stats] = raw.map(Number);
            ids.forEach((id, i) => {
                let currentLineMin = -1, currentLineMax = -1;
                for(let iv=0; iv<=31; iv++) {
                    let calc = (i===0) ? Math.floor(((base[0]*2 + iv)*lvl)/100) + lvl + 10 : Math.floor((Math.floor(((base[i]*2 + iv)*lvl)/100) + 5) * mods[i]);
                    if(calc === stats[i]) {
                        if(currentLineMin === -1) currentLineMin = iv;
                        currentLineMax = iv;
                    }
                }
                if (currentLineMin !== -1) {
                    finalRanges[i].min = Math.max(finalRanges[i].min, currentLineMin);
                    finalRanges[i].max = Math.min(finalRanges[i].max, currentLineMax);
                }
            });
        });

        ids.forEach((id, i) => {
            document.getElementById(id+'_min').value = finalRanges[i].min;
            document.getElementById(id+'_max').value = finalRanges[i].max;
        });
        document.getElementById('f_nature').value = natureIdx;
    }

    let worker;

    function buscar() {
        const tid = parseInt(document.getElementById('tid').value);
        const sid = parseInt(document.getElementById('sid').value);
        const method = parseInt(document.getElementById('method').value);
        const seedsText = document.getElementById('enter_seeds').value.trim();
        const btn = document.getElementById('searchBtn');
        const tBody = document.querySelector('#resultsTable tbody');
        
        let seedsList = [];
        if (seedsText) seedsList = seedsText.split('\n').map(s => s.trim());
        else for (let i = 0; i <= 0xFFFF; i++) seedsList.push(i.toString(16).toUpperCase().padStart(4, '0'));

        const target = parseInt(document.getElementById('target_adv').value);
        const offset = parseInt(document.getElementById('offset_adv').value);
        
        tBody.innerHTML = "<tr><td colspan='11'>Calculando... (El pato está trabajando)</td></tr>";
        btn.disabled = true;
        btn.innerText = "Buscando...";

        const filters = {
            shiny: document.getElementById('f_shiny').value,
            nature: document.getElementById('f_nature').value,
            hp_min: parseInt(document.getElementById('hp_min').value), hp_max: parseInt(document.getElementById('hp_max').value),
            at_min: parseInt(document.getElementById('at_min').value), at_max: parseInt(document.getElementById('at_max').value),
            df_min: parseInt(document.getElementById('df_min').value), df_max: parseInt(document.getElementById('df_max').value),
            sa_min: parseInt(document.getElementById('sa_min').value), sa_max: parseInt(document.getElementById('sa_max').value),
            sd_min: parseInt(document.getElementById('sd_min').value), sd_max: parseInt(document.getElementById('sd_max').value),
            sp_min: parseInt(document.getElementById('sp_min').value), sp_max: parseInt(document.getElementById('sp_max').value)
        };

        if (worker) worker.terminate();
        worker = new Worker('worker.js');

        worker.postMessage({ seedsList, tid, sid, target, offset, filters, natures, method });

        worker.onmessage = function(e) {
            const results = e.data;
            tBody.innerHTML = results.length ? "" : "<tr><td colspan='11'>No se encontraron resultados.</td></tr>";
            results.forEach(r => {
                tBody.innerHTML += `<tr class="${r.isS ? 'shiny-row' : ''}">
                    <td>${r.adv}</td><td>${r.pid}</td><td>${r.sHex}</td><td>${r.nature}</td>
                    <td>${r.ivs.h}</td><td>${r.ivs.a}</td><td>${r.ivs.d}</td><td>${r.ivs.sa}</td><td>${r.ivs.sd}</td><td>${r.ivs.s}</td><td>${r.isS ? '✨' : ''}</td>
                </tr>`;
            });
            btn.disabled = false;
            btn.innerText = "Search";
        };
    }
</script>
</body>
</html>
